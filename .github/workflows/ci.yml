name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Lint · Test · Coverage · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (lint)
        run: npm run lint

      - name: Run tests
        run: npm run test:run

      - name: Coverage (must meet thresholds in vitest.config.ts)
        run: npm run coverage

      - name: Build
        run: npm run build
